# grafana-provisioning.yaml — Grafana datasources + Prometheus namespace selector
# Used when grafana is part of kube-prometheus-stack
grafana:
  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      # Loki 6.x exposes reads/writes through loki-gateway (port 80), not loki:3100
      url: http://loki-gateway.config-service.svc.cluster.local:80
      jsonData:
        maxLines: 1000
    - name: Jaeger
      type: jaeger
      access: proxy
      url: http://jaeger-allInOne.config-service.svc.cluster.local:16686

prometheus:
  prometheusSpec:
    # Watch ServiceMonitors in ALL namespaces (not just the kube-prometheus-stack namespace)
    serviceMonitorNamespaceSelector: {}
    # Watch all ServiceMonitors regardless of release label
    serviceMonitorSelectorNilUsesHelmValues: false

