apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "config-service.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "config-service.labels" . | nindent 4 }}
data:
  PORT: {{ .Values.config.port | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  ENABLE_KAFKA: {{ .Values.config.enableKafka | quote }}
  ENABLE_METRICS: {{ .Values.config.enableMetrics | quote }}
  OTLP_ENDPOINT: {{ .Values.config.otlpEndpoint | quote }}
