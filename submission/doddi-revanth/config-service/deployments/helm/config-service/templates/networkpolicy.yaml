{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "config-service.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "config-service.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "config-service.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow HTTP from anywhere within the cluster
    - ports:
        - protocol: TCP
          port: 8080
  egress:
    # PostgreSQL
    - ports:
        - protocol: TCP
          port: 5432
    # Kafka
    - ports:
        - protocol: TCP
          port: 9092
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # OTLP gRPC
    - ports:
        - protocol: TCP
          port: 4317
{{- end }}
