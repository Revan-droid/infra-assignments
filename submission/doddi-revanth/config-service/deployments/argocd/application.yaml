apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: config-service
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/name: config-service
    app.kubernetes.io/part-of: platform
spec:
  project: default
  source:
    repoURL: https://github.com/doddi-revanth/config-service
    targetRevision: HEAD
    path: deployments/helm/config-service
    helm:
      valueFiles:
        - values.yaml
      parameters:
        - name: image.tag
          value: "latest"
  destination:
    server: https://kubernetes.default.svc
    namespace: config-service
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 5
